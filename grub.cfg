set timeout=30
set timeout_style=menu

# Load fonts and graphics
loadfont unicode
insmod all_video
insmod gfxterm
insmod jpeg
set gfxmode=1024x768x32,auto
set gfxpayload=keep
terminal_output gfxterm

# Color scheme
set menu_color_normal=cyan/black
set menu_color_highlight=black/cyan

# Default selection
set default=0

# Show ASCII logo first
clear

# Set cyan color for text AFTER clear
set color_normal=cyan/black

echo " "
echo "██████╗ ██╗███╗   ███╗███████╗███╗   ██╗███████╗██╗ ██████╗ ███╗   ██╗ █████╗ ██╗"
echo "██╔══██╗██║████╗ ████║██╔════╝████╗  ██║██╔════╝██║██╔═══██╗████╗  ██║██╔══██╗██║"
echo "██║  ██║██║██╔████╔██║█████╗  ██╔██╗ ██║███████╗██║██║   ██║██╔██╗ ██║███████║██║"
echo "██║  ██║██║██║╚██╔╝██║██╔══╝  ██║╚██╗██║╚════██║██║██║   ██║██║╚██╗██║██╔══██║██║"
echo "██████╔╝██║██║ ╚═╝ ██║███████╗██║ ╚████║███████║██║╚██████╔╝██║ ╚████║██║  ██║███████╗"
echo "╚═════╝ ╚═╝╚═╝     ╚═╝╚══════╝╚═╝  ╚═══╝╚══════╝╚═╝ ╚═════╝ ╚═╝  ╚═══╝╚═╝  ╚═╝╚══════╝"
echo " "
echo "                    ╔═══════════════════════════════════════╗"
echo "                    ║            DimOS v0.0.5               ║"
echo "                    ╚═══════════════════════════════════════╝"
echo " "

# Wait 2 seconds to show ASCII
sleep 2

# Now set background image for menu (JPG format)
if [ -f /boot/grub/dimensional.jpg ]; then
    background_image /boot/grub/dimensional.jpg
fi

menuentry "► DIMENSIONAL OPERATING SYSTEM" {
    set gfxpayload=keep
    linux    /casper/vmlinuz  --- quiet splash loglevel=0 systemd.show_status=0 vt.handoff=1
    initrd    /casper/initrd.gz
}

menuentry "► DIMENSIONAL OPERATING SYSTEM [SAFE GRAPHICS]" {
    set gfxpayload=keep
    linux    /casper/vmlinuz nomodeset  --- quiet splash loglevel=0 systemd.show_status=0
    initrd    /casper/initrd.gz
}

menuentry "► DIMENSIONAL OPERATING SYSTEM [DEBUG MODE]" {
    set gfxpayload=keep
    linux    /casper/vmlinuz  --- nosplash verbose debug systemd.log_level=debug
    initrd    /casper/initrd.gz
}

if [ "$grub_platform" = "efi" ]; then
    menuentry "╔ UEFI FIRMWARE SETTINGS" {
        fwsetup
    }
    menuentry "╚ BOOT FROM NEXT VOLUME" {
        exit 1
    }
else
    menuentry "╔ TEST MEMORY" {
        linux16 /boot/memtest86+x64.bin
    }
fi

menuentry "◼ SHUTDOWN SYSTEM" {
    halt
}